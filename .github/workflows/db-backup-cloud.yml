name: DB Backup Cloud

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_BACKUP_MODE: auto
      DB_BACKUP_KEEP: 30
      DB_BACKUP_CLOUD_UPLOAD: off

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install pg_dump client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Run backup
        run: npm run db:backup:cloud

      - name: Upload backup artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: db-backups-${{ github.run_id }}
          path: |
            backups/db/**
            backups/db-archives/**
          if-no-files-found: error
          retention-days: 30

      - name: Keep only 3 latest DB backup artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          to_delete_ids="$(
            gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              | node -e '
                let raw = "";
                process.stdin.on("data", (chunk) => (raw += chunk));
                process.stdin.on("end", () => {
                  const payload = JSON.parse(raw || "{}");
                  const artifacts = Array.isArray(payload.artifacts) ? payload.artifacts : [];
                  const backupArtifacts = artifacts
                    .filter((a) => a && typeof a.name === "string" && a.name.startsWith("db-backups-"))
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                  const stale = backupArtifacts.slice(3);
                  process.stdout.write(stale.map((a) => String(a.id)).join("\n"));
                });
              '
          )"

          if [ -z "${to_delete_ids}" ]; then
            echo "No stale DB backup artifacts to delete."
            exit 0
          fi

          echo "${to_delete_ids}" | while IFS= read -r artifact_id; do
            [ -z "${artifact_id}" ] && continue
            echo "Deleting artifact ${artifact_id}"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/${artifact_id}"
          done
